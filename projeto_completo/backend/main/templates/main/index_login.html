{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieStar - Login</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      .log_in {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .texts_log_in {
        background-color: #fff4b8;
        display: flex;
        flex-direction: column;
        gap: 30px;
        padding-left: 200px;
        padding-right: 200px;
        margin-top: 10vh;
        margin-bottom: 10vh;
        height: calc(80vh);
        border: 1px solid black;
      }
      h1 {
        font-size: 50px;
      }
      button {
        background-color: #ffd900;
        font-size: 15px;
      }
      button:hover {
        box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.5);
        font-size: 16px;
      }
      input {
        width: 300px;
        height: 30px;
      }
      form article {
        display: initial;
      }
      form article a {
        background-color: #ffd900;
        padding: 5px;
        border: 1px solid black;
        text-decoration: none;
        color: black;
      }
      form article a:hover {
        box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.5);
      }
      .error-msg {
        color: red;
        margin: 0;
      }
    </style>
  </head>

  <body class="log_in">
    <form action="{% url 'index_login' %}" method="POST" class="texts_log_in">
      {% csrf_token %}
      <h1>Login</h1>

      {% if messages %} {% for message in messages %}
      <p class="error-msg">{{ message }}</p>
      {% endfor %} {% endif %}

      <input
        type="text"
        id="username"
        name="username"
        placeholder="Usuário"
        required
      />

      <input
        type="password"
        id="password"
        name="password"
        placeholder="Senha"
        required
      />

      <button type="submit">Entrar</button>

      <article>
        <p>É novo por aqui?</p>
        <a href="{% url 'index_cadastro' %}">Cadastre-se</a>
      </article>
    </form>
  </body>
</html>
